{% extends 'base.html' %}

{% block content %}
<h1>{{ test.title }}</h1>
<p>{{ test.description }}</p>

<form method="post">
    {% csrf_token %}
    {% for q in questions %}
    <div class="card">
        <p><strong>{{ forloop.counter }}. {{ q.text }}</strong></p>
        <label><input type="radio" name="question_{{ q.id }}" value="A" required> A) {{ q.option_a }}</label><br>
        <label><input type="radio" name="question_{{ q.id }}" value="B"> B) {{ q.option_b }}</label><br>
        <label><input type="radio" name="question_{{ q.id }}" value="C"> C) {{ q.option_c }}</label><br>
        <label><input type="radio" name="question_{{ q.id }}" value="D"> D) {{ q.option_d }}</label>
    </div>
    {% endfor %}
    <button type="submit" class="btn">✅ Тестті аяқтау</button>
</form>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>🔐 Кіру</h1>
    {% if messages %}
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Логин" required><br><br>
        <input type="password" name="password" placeholder="Құпия сөз" required><br><br>
        <button type="submit" class="btn">Кіру</button>
    </form>
    <p>Есеп жоқ па? <a href="/register/">Тіркелу</a></p>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>📐 5-сынып формулалары</h1>
</div>

<div class="menu-grid">
    {% for formula in formulas %}
    <div class="menu-card">
        <div class="menu-icon">📐</div>
        <h3>{{ formula.title }}</h3>
        <p style="font-size: 1.3rem; font-weight: bold; color: #667eea;">{{ formula.formula_text }}</p>
        <p>{{ formula.description }}</p>
    </div>
    {% empty %}
    <div class="card">
        <p>Әзірге формулалар жоқ. Админ панелінен қосыңыз!</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
